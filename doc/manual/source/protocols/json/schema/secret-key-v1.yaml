"$schema": "http://json-schema.org/draft-07/schema"
"$id": "https://nix.dev/manual/nix/latest/protocols/json/schema/secret-key-v1.json"
title: Secret Key
description: |
  A named Ed25519 secret key used for signing Nix store paths.

  The `key` field contains the secret key encoded as a DER PKCS#8 / `OneAsymmetricKey` structure
  ([RFC 5958](https://www.rfc-editor.org/rfc/rfc5958), [RFC 8410](https://www.rfc-editor.org/rfc/rfc8410)),
  then Base64-encoded.

  For now, the PKCS#8 structure must use the Ed25519 algorithm (OID 1.3.101.112).
  The use of PKCS#8, however, allows us to support more key types in the future in a standards-compliant manner.

  > **Note**
  >
  > Per the PKCS#8 specification, only the 32-byte seed is stored;
  > the full key can be deterministically derived on deserialization.
  > This is in contrast to Nix's older ad-hoc (non-standard beyond Nix) string format,
  > where Nix stored both the seed and the full key for caching purposes.

  > **Warning**
  >
  > This JSON format is currently
  > [**experimental**](@docroot@/development/experimental-features.md#xp-feature-nix-command)
  > and subject to change.

type: object
required:
  - name
  - key
properties:
  name:
    type: string
    title: Key Name
    description: The name of this key
  key:
    type: string
    title: Key Data
    description: The secret key as a DER-encoded PKCS#8 / OneAsymmetricKey structure, Base64-encoded
