name: "CI"

on:
  pull_request:
  push:
    branches:
      # NOTE: make sure any branches here are also valid directory names,
      # otherwise creating the directory and uploading to s3 will fail
      - main
  merge_group:
  release:
    types:
      - published

permissions:
  id-token: "write"
  contents: "read"
  pull-requests: "write"
  statuses: "write"
  deployments: "write"

jobs:
  eval:
    runs-on: UbuntuLatest32Cores128G
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: DeterminateSystems/determinate-nix-action@main
      - run: nix flake show --all-systems --json

  build_x86_64-linux:
    uses: ./.github/workflows/build.yml
    # Determinate Secure Packages is a private flake dependency that external
    # (fork) contributors can't access, so only build it for non-fork PRs.
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == 'DeterminateSystems/nix-src'
    with:
      system: x86_64-linux
      runner: namespace-profile-linuxamd32c64g-cache
      runner_for_virt: UbuntuLatest32Cores128G
      runner_small: ubuntu-latest
      run_tests: true
      run_vm_tests: true
      run_regression_tests: true
      publish_manual: true
    secrets:
      manual_netlify_auth_token: ${{ secrets.NETLIFY_AUTH_TOKEN }}
      manual_netlify_site_id: ${{ secrets.NETLIFY_SITE_ID }}
      sentry_auth_token: ${{ secrets.SENTRY_AUTH_TOKEN }}
      sentry_org: ${{ secrets.SENTRY_ORG }}
      sentry_project: ${{ secrets.SENTRY_PROJECT }}

  build_x86_64-linux_no_dsp:
    uses: ./.github/workflows/build.yml
    # Build the non-DSP flake in the merge queue, on tags, and for external (fork) PRs,
    # which can't access Determinate Secure Packages.
    if: github.event_name == 'merge_group' || startsWith(github.ref, 'refs/tags/') || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != 'DeterminateSystems/nix-src')
    with:
      flake: .
      system: x86_64-linux
      runner: namespace-profile-linuxamd32c64g-cache
      runner_for_virt: UbuntuLatest32Cores128G
      runner_small: ubuntu-latest
      run_tests: true
      run_vm_tests: false
      run_regression_tests: false
      upload_artifacts: false

  build_aarch64-linux:
    uses: ./.github/workflows/build.yml
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == 'DeterminateSystems/nix-src'
    with:
      system: aarch64-linux
      runner: UbuntuLatest32Cores128GArm
      runner_for_virt: UbuntuLatest32Cores128GArm
      runner_small: UbuntuLatest32Cores128GArm
    secrets:
      sentry_auth_token: ${{ secrets.SENTRY_AUTH_TOKEN }}
      sentry_org: ${{ secrets.SENTRY_ORG }}
      sentry_project: ${{ secrets.SENTRY_PROJECT }}

  build_aarch64-linux_no_dsp:
    uses: ./.github/workflows/build.yml
    if: github.event_name == 'merge_group' || startsWith(github.ref, 'refs/tags/') || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != 'DeterminateSystems/nix-src')
    with:
      flake: .
      system: aarch64-linux
      runner: UbuntuLatest32Cores128GArm
      runner_for_virt: UbuntuLatest32Cores128GArm
      runner_small: UbuntuLatest32Cores128GArm
      upload_artifacts: false
    secrets:
      sentry_auth_token: ${{ secrets.SENTRY_AUTH_TOKEN }}
      sentry_org: ${{ secrets.SENTRY_ORG }}
      sentry_project: ${{ secrets.SENTRY_PROJECT }}

  build_aarch64-darwin:
    uses: ./.github/workflows/build.yml
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == 'DeterminateSystems/nix-src'
    with:
      system: aarch64-darwin
      runner: namespace-profile-mac-m2-12c28g
      runner_for_virt: namespace-profile-mac-m2-12c28g
      runner_small: macos-latest-xlarge
    secrets:
      sentry_auth_token: ${{ secrets.SENTRY_AUTH_TOKEN }}
      sentry_org: ${{ secrets.SENTRY_ORG }}
      sentry_project: ${{ secrets.SENTRY_PROJECT }}

  build_aarch64-darwin_no_dsp:
    uses: ./.github/workflows/build.yml
    if: github.event_name == 'merge_group' || startsWith(github.ref, 'refs/tags/') || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != 'DeterminateSystems/nix-src')
    with:
      flake: .
      system: aarch64-darwin
      runner: namespace-profile-mac-m2-12c28g
      runner_for_virt: namespace-profile-mac-m2-12c28g
      runner_small: macos-latest-xlarge
      upload_artifacts: false
    secrets:
      sentry_auth_token: ${{ secrets.SENTRY_AUTH_TOKEN }}
      sentry_org: ${{ secrets.SENTRY_ORG }}
      sentry_project: ${{ secrets.SENTRY_PROJECT }}

  success:
    runs-on: ubuntu-latest
    needs:
      - eval
      - build_x86_64-linux
      - build_aarch64-linux
      - build_aarch64-darwin
      - build_x86_64-linux_no_dsp
      - build_aarch64-linux_no_dsp
      - build_aarch64-darwin_no_dsp
    if: ${{ always() }}
    steps:
      - run: "true"
      - run: |
          echo "A dependent in the build matrix failed:"
          echo "$needs"
          exit 1
        env:
          needs: ${{ toJSON(needs) }}
        if: |
          contains(needs.*.result, 'failure') ||
          contains(needs.*.result, 'cancelled')

      - uses: actions/checkout@v4
      - uses: DeterminateSystems/determinate-nix-action@main
      - uses: DeterminateSystems/flakehub-cache-action@main

      - name: Create artifacts directory
        run: mkdir -p ./artifacts

      - name: Fetch artifacts
        uses: actions/download-artifact@v7
        with:
          path: downloaded
      - name: Move downloaded artifacts to artifacts directory
        run: |
          shopt -s nullglob
          for dir in ./downloaded/*; do
            arch="$(basename "$dir")"
            mv "$dir"/*.xz ./artifacts/"${arch}"
          done

      - name: Build fallback-paths.nix
        id: build
        if: ${{
              github.event_name != 'pull_request'
              || (
                github.event.pull_request.head.repo.full_name == 'DeterminateSystems/nix-src'
                && (
                  (github.event.action == 'labeled' && github.event.label.name == 'upload to s3')
                  || (github.event.action != 'labeled' && contains(github.event.pull_request.labels.*.name, 'upload to s3'))
                )
              )
            }}
        env:
          INCLUDE_NO_DSP: ${{
              needs.build_x86_64-linux_no_dsp.result == 'success'
              && needs.build_aarch64-linux_no_dsp.result == 'success'
              && needs.build_aarch64-darwin_no_dsp.result == 'success'
            }}
        run: |
          for system in x86_64-linux aarch64-linux aarch64-darwin; do
            nix build ./packaging/secure-packages#packages."$system".default^out,dev,doc,man --out-link /tmp/outputs/"$system"-dsp -j0
            [[ "$INCLUDE_NO_DSP" == "true" ]] && nix build .#packages."$system".default^out,dev,doc,man --out-link /tmp/outputs/"$system"-non-dsp -j0
          done

          [[ "$INCLUDE_NO_DSP" == "true" ]] && nix build .#fallbackPathsNix --out-link /tmp/outputs/fallback-non-dsp
          nix build ./packaging/secure-packages#fallbackPathsNix --out-link /tmp/outputs/fallback-dsp
          cat /tmp/outputs/fallback-dsp > ./artifacts/fallback-paths.nix

          outputs=()
          for path in /tmp/outputs/*; do
            outputs+=("$(readlink $path)")
          done
          echo "nix-outputs=${outputs[@]}" >> "$GITHUB_OUTPUT"

      - uses: DeterminateSystems/public-slice-mirror/.github/actions/upload-store-paths@main
        with:
          store-paths: |
            ${{ steps.build.outputs.nix-outputs }}

      - uses: DeterminateSystems/push-artifact-ids@main
        with:
          s3_upload_role: ${{ secrets.AWS_S3_UPLOAD_ROLE_ARN }}
          bucket: ${{ secrets.AWS_S3_UPLOAD_BUCKET_NAME }}
          directory: ./artifacts
          ids_project_name: determinate-nix
          ids_binary_prefix: determinate-nix
          skip_acl: true
          allowed_branches: '["main"]'
    outputs:
      nix-outputs: ${{ steps.build.outputs.nix-outputs }}

  publish:
    needs:
      - success
    # NOTE(cole-h): we need always() here because if any of the needs jobs are skipped (this is
    # transitive as well, so if any of success's needs jobs are skipped, like the *_no_dsp ones
    # usually are on release), this gets skipped too...
    if: (always() && github.repository == 'DeterminateSystems/nix-src' && (github.ref == format('refs/heads/{0}', github.event.repository.default_branch) || startsWith(github.ref, 'refs/tags/')))
    environment: ${{ github.event_name == 'release' && 'production' || '' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/determinate-nix-action@main
      - uses: DeterminateSystems/flakehub-push@main
        with:
          rolling: ${{ github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}
          visibility: "public"
          tag: "${{ github.ref_name }}"
          include-output-paths: true
      - name: Ensure that we actually released
        if: startsWith(github.ref, 'refs/tags/')
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          nix flake metadata https://flakehub.com/f/DeterminateSystems/nix-src/"$TAG_NAME"
      - name: Update the release notes
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          gh release edit "$TAG_NAME" --notes-file doc/manual/source/release-notes-determinate/"$TAG_NAME".md || true

  mirror:
    needs: success
    permissions:
      id-token: write   # required so the workflow can auth to FlakeHub
      contents: read
    if: ${{
          always()
          && (
            github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
            || startsWith(github.ref, 'refs/tags/')
            || (
              github.event_name == 'pull_request'
              && github.event.pull_request.head.repo.full_name == 'DeterminateSystems/nix-src'
              && (
                (github.event.action == 'labeled' && github.event.label.name == 'upload to s3')
                || (github.event.action != 'labeled' && contains(github.event.pull_request.labels.*.name, 'upload to s3'))
              )
            )
          )
        }}
    uses: DeterminateSystems/public-slice-mirror/.github/workflows/subset-mirror.yml@main
    with:
      flake-name: DeterminateSystems/nix-artifacts
      rolling: ${{ github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}
      tag: "${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}"
      checkout-ref: "${{ github.ref }}"
      flakehub-push: ${{ github.ref == format('refs/heads/{0}', github.event.repository.default_branch) || startsWith(github.ref, 'refs/tags/') }}
