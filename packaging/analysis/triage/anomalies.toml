[[anomaly]]
id = "semgrep-sqlite-exec"
tool = "semgrep"
check_id = "nix.store.sqlite-exec-non-literal"
file = "src/libstore/sqlite.cc"
code_anchor = "sqlite3_exec(db, stmt.c_str(), 0, 0, 0)"
status = "false-positive"
