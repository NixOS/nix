# Known static analysis anomalies for the Nix codebase.
#
# Each [[anomaly]] entry documents a finding that has been reviewed.
# Matching uses: tool + check_id + file (exact) + code_anchor (literal
# substring within ±anchor_window lines of the reported line).
#
# Status values:
#   false-positive  — reviewed, not a real issue (suppressed from reports)
#   needs-review    — potentially real issue, flagged for maintainer review
#   confirmed-bug   — verified real bug, tracked until fixed
#   wont-fix        — real issue but accepted risk (suppressed from reports)
#
# Per-anomaly analysis docs: packaging/analysis/anomalies/<id>.md

# ─── False Positives ──────────────────────────────────────────────────

[[anomaly]]
id = "cppcheck-rethrow-util"
tool = "cppcheck"
check_id = "rethrowNoCurrentException"
file = "src/libutil/util.cc"
code_anchor = "try {\n        try {\n            throw;"
status = "false-positive"
reason = "Legitimate nested rethrow in ignoreExceptionInDestructor() — called from catch blocks"
remediations = [
    "Add // cppcheck-suppress rethrowNoCurrentException",
    "Restructure to use std::current_exception + std::rethrow_exception",
]

[[anomaly]]
id = "cppcheck-rethrow-nix-api-util"
tool = "cppcheck"
check_id = "rethrowNoCurrentException"
file = "src/libutil-c/nix_api_util.cc"
code_anchor = "try {\n        throw;\n    } catch (nix::Error & e)"
anchor_window = 2
status = "false-positive"
reason = "try { throw; } catch pattern in nix_context_error() — called from NIXC_CATCH_ERRS macro"
remediations = [
    "Add // cppcheck-suppress rethrowNoCurrentException",
    "Accept std::exception_ptr parameter instead of bare rethrow",
]

[[anomaly]]
id = "cppcheck-accessMoved-finally-ctor"
tool = "cppcheck"
check_id = "accessMoved"
