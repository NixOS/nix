[[anomaly]]
id = "flawfinder-fopen-cgroup"
tool = "flawfinder"
check_id = "misc.fopen"
file = "src/libutil/linux/cgroup.cc"
code_anchor = 'auto fp = fopen("/proc/mounts", "r");'
status = "wont-fix"
reason = "Opening /proc/mounts with fopen — inherent procfs limitation, no TOCTOU mitigation possible"
remediations = [
    "Use std::ifstream with RAII for automatic cleanup",
    "Consider using /proc/self/mounts for process-specific view",
    "Accept as inherent procfs limitation and document",
]

