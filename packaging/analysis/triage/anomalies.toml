status = "false-positive"
reason = "Correct move constructor — setting movedFrom on source object after move is the whole point"
remediations = [
    "Add // cppcheck-suppress accessMoved",
    "Use std::optional<Fn> instead of movedFrom flag",
]

[[anomaly]]
