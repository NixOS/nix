]

[[anomaly]]
id = "semgrep-delete-this-eval-error"
tool = "semgrep"
check_id = "nix.store.delete-this"
file = "src/libexpr/eval-error.cc"
code_anchor = "auto error = std::move(this->error);\n    delete this;"
status = "false-positive"
reason = "Intentional RAII cleanup in EvalErrorBuilder::debugThrow() — object is heap-allocated by EvalState"
remediations = [
    "Add a nosemgrep comment on the line",
    "Return std::unique_ptr<EvalErrorBuilder> from factory instead of raw new",
]

[[anomaly]]
id = "clang-tidy-forwarding-ref-overload-error"
tool = "clang-tidy"
check_id = "bugprone-forwarding-reference-overload"
file = "src/libutil/include/nix/util/error.hh"
code_anchor = "SysError(auto && mkHintFmt)\n        requires std::invocable<decltype(mkHintFmt)>"
status = "false-positive"
reason = "C++20 requires clause prevents overload hijacking — only matches callables returning HintFmt"
remediations = [
    "Add NOLINT comment for clang-tidy",
    "Use a named factory function instead of a constrained constructor",
]

[[anomaly]]
id = "clang-tidy-move-forwarding-ref-diagnose"
tool = "clang-tidy"
check_id = "bugprone-move-forwarding-reference"
file = "src/libexpr/include/nix/expr/diagnose.hh"
code_anchor = "throw std::move(error)"
status = "false-positive"
reason = "Handler always receives rvalue via std::move(*maybeError) — std::move on error is correct"
remediations = [
    "Replace std::move(error) with std::forward<decltype(error)>(error)",
    "Add NOLINT comment for clang-tidy",
]

# ─── Confirmed Bugs / Needs Review ───────────────────────────────────

[[anomaly]]
id = "cppcheck-rethrow-nix-api-util-real"
tool = "cppcheck"
check_id = "rethrowNoCurrentException"
file = "src/libutil-c/nix_api_util.cc"
code_anchor = "if (context == nullptr) {\n        throw;"
anchor_window = 2
status = "confirmed-bug"
reason = "Bare throw; outside any catch block — calls std::terminate() if no active exception"
remediations = [
    "Throw a specific exception: throw nix::Error(\"nix_context_error called with null context\")",
    "Return an error code instead of throwing",
    "Accept std::exception_ptr and use std::rethrow_exception",
]

[[anomaly]]
id = "cppcheck-uninitMemberVar-DrvName"
tool = "cppcheck"
check_id = "uninitMemberVar"
file = "src/libstore/names.cc"
code_anchor = "DrvName::DrvName()\n{"
status = "confirmed-bug"
reason = "Default constructor leaves DrvName::hits uninitialized — reads return garbage"
remediations = [
    "Add in-class initializer: unsigned int hits = 0;",
    "Initialize hits in the default constructor body",
]

[[anomaly]]
id = "cppcheck-unsignedLessThanZero-serialise"
tool = "cppcheck"
check_id = "unsignedLessThanZero"
file = "src/libutil/include/nix/util/serialise.hh"
code_anchor = "if (this->remain <= 0)"
status = "confirmed-bug"
reason = "size_t is unsigned — '<= 0' is equivalent to '== 0', the '< 0' part is dead code"
remediations = [
    "Change to 'if (this->remain == 0)' to express intent clearly",
    "Consider whether remain should be a signed type to detect underflow",
]

